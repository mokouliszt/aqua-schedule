name: Publish to PyPI

# GitHub上で「Release」を作成するとPyPIに公開する。
#
# 事前準備 (一度だけ):
#   1. https://pypi.org/manage/account/publishing/ で
#      "Trusted publisher" を追加。
#        - PyPI Project Name: fre800slmp
#        - Owner: mokouliszt
#        - Repository name: fre800slmp
#        - Workflow name: publish.yml
#        - Environment name: pypi
#   2. このリポジトリの Settings → Environments で
#      "pypi" という名前のenvironmentを作成 (保護ルールは任意で)。
#
# 公開手順:
#   1. CHANGELOG.md と pyproject.toml の version を更新してマージ
#   2. GitHubのReleases画面で "Draft a new release"
#   3. タグを v0.x.y で作成 (vプレフィックス付き)
#   4. "Publish release" → 本workflowが起動 → PyPIに反映

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - name: Verify wheel & sdist
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fre800slmp
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC) に必須
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # API tokenは不要。OIDC + Trusted Publisherで認証される。
